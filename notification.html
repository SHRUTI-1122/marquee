<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Notification Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f9fafb);
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .container {
            width: min(420px, 90vw);
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
        }

        .notify-btn {
            position: relative;
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            background: #4f46e5;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -4px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        .panel {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            display: none;
        }

        .panel.open {
            display: block;
        }

        .notification-item {
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
            animation: fadeIn 0.3s ease;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="synchrinaization.js" defer></script>
</head>
<body>
    <div class="container">
        <button class="notify-btn" id="notifyBtn" type="button">
            Notifications
            <span class="badge" id="notifyBadge">0</span>
        </button>
        <div class="panel" id="notifyPanel"></div>
    </div>
</body>
</html>
